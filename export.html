<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>例文CSVエクスポートツール</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f5f6fa; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #333; }
        p { color: #555; line-height: 1.6; }
        .btn { display: inline-block; padding: 12px 24px; font-size: 16px; color: white; background-color: #4a69bd; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; margin-top: 20px; transition: background-color 0.2s; }
        .btn:hover { background-color: #38508f; }
        .success-msg { margin-top: 20px; padding: 10px; color: #155724; background-color: #d4edda; border-color: #c3e6cb; border-radius: 5px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>例文CSVエクスポートツール</h1>
        <p>全学年の漢字データの例文を取り出し、エクセル等で編集可能なCSVファイルとしてダウンロードします。</p>
        <p>ダウンロードしたCSVファイルをエクセル等で開き、<strong>一番右の「全文ひらがな」の列（F列）にひらがなを追加して保存</strong>してください。<br>
        ※保存する際は、UTF-8形式のCSVをお選びいただくと文字化けを防げます。</p>
        
        <button id="downloadBtn" class="btn">例文CSVをダウンロードする</button>
        <div id="successMsg" class="success-msg">CSVファイルのダウンロードが完了しました！</div>
    </div>
    
    <!-- 必要なスクリプトの読み込み -->
    <script src="js/raw-data.js"></script>
    <script src="js/data-grade1.js"></script>
    <script src="js/data-grade2.js"></script>
    <script src="js/data-grade3.js"></script>
    <script src="js/data-grade4.js"></script>
    <script src="js/data-grade5.js"></script>
    <script src="js/data-grade6.js"></script>
    <script src="js/data.js"></script>
    <script>
        document.getElementById('downloadBtn').addEventListener('click', () => {
            // ヘッダー行
            let csvContent = "学年,漢字,読み種類,対象の読み,問題文,全文ひらがな\n";
            let count = 0;
            
            KANJI_DATA.forEach(k => {
                if (k.exampleSentences) {
                    k.exampleSentences.forEach(ex => {
                        const char = k.char;
                        const grade = k.grade;
                        const type = ex.readingType === 'onyomi' ? '音読み' : '訓読み';
                        const reading = ex.targetReading;
                        
                        // [] のマークアップを除去して、実際の表示と同じテキストにする
                        // 例: "[一/イチ]がつのカレンダー" -> "一がつのカレンダー"
                        const cleanText = ex.text.replace(/\[([^/]+)\/([^\]]+)\]/g, '$1');
                        
                        // CSV用のエスケープ処理
                        const escapeCsv = (str) => '"' + (str || '').replace(/"/g, '""') + '"';
                        
                        csvContent += `${grade},${char},${type},${reading},${escapeCsv(cleanText)},\n`;
                        count++;
                    });
                }
            });
            
            // BOMつきUTF-8で保存（Excelでの文字化け防止）
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, csvContent], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "kanji_examples_export.csv";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            const msg = document.getElementById('successMsg');
            msg.textContent = `全 ${count} 件の例文データをCSVとして出力しました！`;
            msg.style.display = 'block';
        });
    </script>
</body>
</html>
