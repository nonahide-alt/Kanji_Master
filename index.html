<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢字マスター - 小学生漢字学習アプリ</title>
  <meta name="description" content="小学1〜6年生の漢字を読み・書きテストで学習し、履歴を可視化して定着を促すアプリです。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-decoration">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>
  </div>

  <div id="app">
    <header id="app-header">
      <button id="back-btn" class="header-btn" onclick="App.goBack()" style="visibility: hidden;">
        <span class="btn-icon">←</span> 戻る
      </button>
      <h1 id="app-title" onclick="App.showHome()">
        <span class="title-icon">漢</span>漢字マスター
      </h1>
      <button id="settings-btn" class="header-btn" onclick="App.showSettings()" style="margin-right: 6px;">
        <span class="btn-icon">⚙️</span> 設定
      </button>
      <button id="history-btn" class="header-btn" onclick="App.navigate('history')">
        <span class="btn-icon">📊</span> 履歴
      </button>
    </header>

    <main id="main-content">
      <!-- ホーム画面 -->
      <section id="home-screen" class="screen active">
        <div class="hero">
          <p class="hero-subtitle">学年を選んで漢字を学ぼう！</p>
        </div>
        <div id="grade-grid" class="grade-grid"></div>
      </section>

      <!-- 学年メニュー画面 -->
      <section id="grade-menu-screen" class="screen">
        <h2 id="grade-menu-title" class="section-title"></h2>
        <div class="menu-cards">
          <button class="menu-card" onclick="App.navigate('list')" id="menu-list-btn">
            <div class="menu-card-icon">📖</div>
            <div class="menu-card-title">漢字一覧</div>
            <div class="menu-card-desc">漢字カードを確認しよう</div>
          </button>
          <button class="menu-card" onclick="App.navigate('test-reading')" id="menu-reading-btn">
            <div class="menu-card-icon">
              <img src="assets/reading-test-icon.svg" alt="読みテスト" class="menu-icon-img">
            </div>
            <div class="menu-card-title">読みテスト</div>
            <div class="menu-card-desc">漢字の読み方を答えよう</div>
          </button>
          <button class="menu-card" onclick="App.navigate('test-writing')" id="menu-writing-btn">
            <div class="menu-card-icon">✏️</div>
            <div class="menu-card-title">書きテスト</div>
            <div class="menu-card-desc">読みから漢字を書こう</div>
          </button>
          <button class="menu-card" onclick="App.showReviewList()" id="menu-review-btn">
            <div class="menu-card-icon">🔥</div>
            <div class="menu-card-title">要復習テスト</div>
            <div class="menu-card-desc">間違えた問題に再挑戦</div>
          </button>
        </div>
      </section>

      <!-- 要復習リスト画面 -->
      <section id="review-list-screen" class="screen">
        <div id="review-list-content"></div>
      </section>

      <!-- 漢字一覧画面 -->
      <section id="list-screen" class="screen">
        <h2 id="list-title" class="section-title"></h2>
        <div class="legend">
          <div class="legend-item"><span class="legend-dot legend-blue"></span>マスター</div>
          <div class="legend-item"><span class="legend-dot legend-green"></span>学習中</div>
          <div class="legend-item"><span class="legend-dot legend-gray"></span>未学習</div>
          <div class="legend-item"><span class="legend-dot legend-red"></span>要復習</div>
        </div>
        <div id="kanji-grid" class="kanji-grid"></div>
      </section>

      <!-- 漢字詳細画面 -->
      <section id="detail-screen" class="screen">
        <div id="detail-content"></div>
      </section>

      <!-- テスト画面 -->
      <section id="test-screen" class="screen">
        <div id="test-content"></div>
      </section>

      <!-- テスト結果画面 -->
      <section id="result-screen" class="screen">
        <div id="result-content"></div>
      </section>

      <!-- 履歴画面 -->
      <section id="history-screen" class="screen">
        <div id="history-content"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script src="js/raw-data.js"></script>
  <script src="js/data-grade1.js"></script>
  <script src="js/data-grade2.js"></script>
  <script src="js/data-grade3.js"></script>
  <script src="js/data-grade4.js"></script>
  <script src="js/data-grade5.js"></script>
  <script src="js/data-grade6.js"></script>
  <script src="js/hiragana-data.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/kanji-list.js"></script>
  <script src="js/kanji-detail.js"></script>
  <script src="js/test-reading.js"></script>
  <script src="js/test-writing.js"></script>
  <script src="js/review-list.js"></script>
  <script src="js/history.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
